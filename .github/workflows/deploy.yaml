name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
  workflow_dispatch: {}   # allow manual runs (e.g. to build the first image)

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: myapp

permissions:
  id-token: write   # to assume the AWS role via OIDC
  contents: write   # to commit the updated image tag back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./app
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "IMAGE_REF=$IMAGE:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Pin StatefulSet to the new image
        run: |
          # Idempotent: rewrites the marked line in place, never the busybox
          # initContainer line (which has no marker).
          sed -i -E "s|image: [^#]*# managed-by-ci|image: ${IMAGE_REF} # managed-by-ci|" k8s/statefulset.yaml
          grep "managed-by-ci" k8s/statefulset.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/statefulset.yaml
          git commit -m "Deploy ${{ github.sha }}" || { echo "no change"; exit 0; }
          git push
